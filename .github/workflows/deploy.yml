# 文件路径: .github/workflows/deploy.yml
name: Databricks CD Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy_to_databricks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy Bundle
        env:
          # Host 必须用 DATABRICKS_ 前缀
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          # 下面这三个 SPN 专属参数，左边的名字必须强制用 ARM_ 前缀！
          # 右边的 secrets.XXX 必须跟你 GitHub 里建的 Secret 名字一字不差
          ARM_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          ARM_TENANT_ID: ${{ secrets.DATABRICKS_TENANT_ID }}
        run: |
          echo "🚀 开始向 PRD 环境进行自动化发版..."
          databricks bundle deploy -t prd
          
          echo "✅ 部署完成！正在自动触发作业运行..."
          databricks bundle run -t prd mexico_order_cleanup_job
